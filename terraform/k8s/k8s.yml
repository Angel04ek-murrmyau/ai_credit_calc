#Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-credit-calc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-credit-calc
  template:
    metadata:
      labels:
        app: ai-credit-calc
    spec:
      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: ai-credit-calc
        image: angel04ek/ai_credit_calc:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "250m"
---
#Service
apiVersion: v1
kind: Service
metadata:
  name: ai-credit-calc-service
spec:
  selector:
    app: ai-credit-calc
  ports:
  - port: 80
    targetPort: 5000
  type: ClusterIP
---
#Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-credit-calc-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-credit-calc-service
            port:
              number: 80