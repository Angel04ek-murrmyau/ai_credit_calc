---
# tasks file for kubernetes
- name: Disable swap
  command: swapoff -a

- name: Remove swap from fstab
  lineinfile:
    path: '/etc/fstab'
    regexp: '\sswap\s'
    state: 'absent'

- name: Load kernel modules for K8s
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Enable IP forwarding
  sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: yes
    state: present
    reload: yes

- name: Let bridge traffic pass through iptables
  sysctl:
    name: "{{ item }}"
    value: '1'
    sysctl_set: yes
    state: present
    reload: yes
  loop:
    - net.bridge.bridge-nf-call-iptables
    - net.bridge.bridge-nf-call-ip6tables

- name: Install dependences
  apt:
    update_cache: yes
    name:
      - ca-certificates
      - curl
      - gnupg
      - apt-transport-https
      - lsb-release
    state: present

- name: Add docker repo key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add docker to sources.list.d
  apt_repository:
    repo: deb https://download.docker.com/linux/ubuntu jammy stable
    state: present

- name: Install containerd
  apt:
    name:
      - containerd.io
    state: present
    update_cache: yes

- name: Create containerd config directory
  file:
    path: /etc/containerd
    state: directory

- name: Generate containerd config
  shell: containerd config default > /etc/containerd/config.toml

- name: Set systemd cgroup driver in containerd
  lineinfile:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    line: '            SystemdCgroup = true'

- name: Restart containerd
  systemd:
    name: containerd
    state: restarted
    enabled: yes

- name: Add kubernetes repo key
  apt_key:
    url: https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
    state: present

- name: Add kubernetes to sources.list.d
  apt_repository:
    repo: deb https://pkgs.k8s.io/core:/stable:/v1.30/deb/ / 
    state: present

- name: Install kubernetes
  apt:
    update_cache: yes
    name:
      - kubelet
      - kubeadm
      - kubectl      
    state: present

- name: Launch kubernetes
  systemd:
    name: kubelet
    enabled: yes
    state: restarted
  
- name: Install node exporter
  apt:
    update_cache: yes
    name: prometheus-node-exporter
    state: present

- name: Check if kubernetes is already initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: kube_config
  run_once: true
  delegate_to: master

- name: Wait for kubeadm init
  pause:
    prompt: "Если Вы запускаете плейбук в первый раз, то выполните kubeadm init и kubeadm join по инструкции в документации, и нажмите Enter. Если Вы запускаете плейбук не впервые, то пропустите этот шаг, и нажмите Enter"
  run_once: true

- name: Install flannel
  shell: kubectl --kubeconfig /etc/kubernetes/admin.conf apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml --validate=false
  delegate_to: master
  run_once: true

- name: Install nginx ingress controller
  shell: kubectl --kubeconfig /etc/kubernetes/admin.conf apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
  delegate_to: master
  run_once: true

- name: Wait for ingress controller to be ready
  shell: kubectl --kubeconfig /etc/kubernetes/admin.conf wait --namespace ingress-nginx --for=condition=ready pod --selector=app.kubernetes.io/component=controller --timeout=120s
  delegate_to: master
  run_once: true
  ignore_errors: yes

- name: Download helm
  get_url:
    url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    dest: /tmp/get_helm.sh
    mode: '0777'

- name: Install helm
  command: /tmp/get_helm.sh

- name: Add grafana repo
  kubernetes.core.helm_repository:
    name: grafana
    repo_url: "https://grafana.github.io/helm-charts"
  run_once: true
  delegate_to: master

- name: Install promtail
  kubernetes.core.helm:
    name: promtail
    chart_ref: grafana/promtail
    release_namespace: monitoring
    create_namespace: true
    kubeconfig: /etc/kubernetes/admin.conf
    values:
      config:
        clients:
          - url: "http://{{ hostvars['srv']['internal_ip'] }}:3100/loki/api/v1/push"
      daemonset:
        enabled: true
    wait: yes
  run_once: true
  delegate_to: master

- name: Copy k8s manifests
  copy:
    src: ../../k8s/
    dest: /home/ubuntu/k8s/
  delegate_to: master
  run_once: true

- name: Apply Deployment and Service
  command: kubectl --kubeconfig /etc/kubernetes/admin.conf apply -f /home/ubuntu/k8s/k8s.yml --validate=false
  delegate_to: master
  run_once: true

- name: Wait for pods to be ready
  shell: kubectl --kubeconfig /etc/kubernetes/admin.conf wait --namespace default --for=condition=ready pod --selector=app=ai-credit-calc --timeout=120s
  delegate_to: master
  run_once: true
  ignore_errors: yes

- name: Apply Ingress 
  command: kubectl --kubeconfig /etc/kubernetes/admin.conf apply -f /home/ubuntu/k8s/k8s.yml --validate=false
  delegate_to: master
  run_once: true